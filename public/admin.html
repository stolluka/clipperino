<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div>
    <a href="/dashboard.html">Dashboard</a>
  </div>
  <button onclick="logout()">Logout</button>
</nav>

<div class="container">
<h1>👑 Admin Panel</h1>
<ul id="userList"></ul>
</div>

<script>
async function loadUsers() {
  const res = await fetch("/api/admin/users");
  const users = await res.json();

  const list = document.getElementById("userList");
  list.innerHTML = "";

  users.forEach(user => {
    const div = document.createElement("div");
    div.className = "clip-card";

    div.innerHTML = `
      <strong>${user.twitch_name}</strong><br>
      Status: ${user.approved ? "✅ Freigegeben" : "❌ Wartend"}
      <br><br>
      <button onclick="approve(${user.id})">Freigeben</button>
      <button class="delete-btn" onclick="removeUser(${user.id})">Löschen</button>
    `;

    list.appendChild(div);
  });
}

async function approve(id) {
  await fetch("/api/admin/approve/" + id, { method: "POST" });
  loadUsers();
}

async function removeUser(id) {
  await fetch("/api/admin/user/" + id, { method: "DELETE" });
  loadUsers();
}

function logout() {
  fetch("/logout").then(() => location.href = "/");
}

loadUsers();
</script>

</body>
</html>
